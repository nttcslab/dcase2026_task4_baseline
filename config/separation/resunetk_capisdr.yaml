---
task_name: __
description: __

deterministic: True
manual_seed: 0

datamodule:
    module: src.datamodules.datamodule
    main: DataModule
    args:
        train_dataloader:
            batch_size: 4
            num_workers: 4
            persistent_workers: false
            dataset:
                module: src.datamodules.dataset
                main: DatasetS3
                args:
                    config:
                        mode: generate
                        spatial_sound_scene:
                            duration: 10.0
                            sr: 32000
                            max_event_overlap: 3
                            max_event_dur: 10.0
                            ref_db: -55
                            foreground_dir: data/dev_set/sound_event/train
                            background_dir: data/dev_set/noise/train
                            interference_dir: data/dev_set/interference/train
                            room_config:
                                module: src.modules.spatial_audio_synthesizer.room
                                main: SofaRoom
                                args:
                                    path: data/dev_set/room_ir/train
                                    direct_range_ms: [6, 50]
                        dupse_rate: 0.5
                        dupse_min_angle: 60.0
                        max_n_dupse: 2
                        dupse_exclusion_folder_depth: 1
                        snr_range: [5, 20]
                        nevent_range: [1, 3] # separation model does not train with 0 SEs
                        ninterference_range: [0, 2]
                        inteference_snr_range: [0, 15]
                        dataset_length: 10112
                        shuffle_label: true
                        fg_return: {dry: true, dry_channel: 0, metadata: true}
                    n_sources: 3
                    label_set: dcase2026t4
                    return_source: true
                    label_vector_mode: concat
                    silence_label_mode: zeros
                    return_meta: false
        val_dataloader:
            batch_size: 4
            num_workers: 4
            persistent_workers: false
            dataset:
                module: src.datamodules.dataset
                main: DatasetS3
                args:
                    config:
                        mode: metadata
                        metadata_list: data/dev_set/metadata/valid.json
                        fg_return: {dry: true, dry_channel: 0, metadata: true}
                        sr: 32000
                    n_sources: 3
                    label_set: dcase2026t4
                    return_source: true
                    label_vector_mode: concat
                    silence_label_mode: zeros
                    return_meta: true
lightning_module:
    module: src.training.lightningmodule.labelqueried_separation
    main: LabelQueriedSeparationLightning
    args:
        model:
            module: src.models.resunet2.resunet_mod
            main: ResUNet30
            args:
                input_channels: 4
                output_channels: 1
                target_sources_num: 3
                label_len: 54
        loss:
            module: src.training.loss.class_aware_pit
            main: get_loss_func
        optimizer:
            module: torch.optim
            main: AdamW
            args:
                params: null # assigned in src.training.label_query_separation
                lr: 0.0001
                betas: [0.9, 0.999]
                eps: 0.00000001
                weight_decay: 0.0
                amsgrad: true
        is_validation: true
train:
    callbacks:
        -
            name: checkpoint
            module: lightning.pytorch.callbacks
            main: ModelCheckpoint
            args:
                every_n_epochs: 1
                filename: "{epoch}"
                save_top_k: 1
                save_last: True
                monitor: epoch_val/loss # check log in src.training.label_query_separation
                mode: min
                verbose: False
                dirpath: null # Assigned in src.train
        -
            name: tqdm
            module: lightning.pytorch.callbacks
            main: TQDMProgressBar
            args:
                refresh_rate: 60
                process_position: 0
    trainer:
        module: lightning.pytorch
        main: Trainer
        args:
            accelerator: auto
            devices: auto
            strategy: ddp_find_unused_parameters_true
            num_nodes: 1
            precision: 32-true
            logger: null
            fast_dev_run: False
            max_epochs: -1
            log_every_n_steps: 100
            use_distributed_sampler: True
            sync_batchnorm: True
            check_val_every_n_epoch: 1
            val_check_interval: 1.0
            num_sanity_val_steps: 0
            enable_checkpointing: True
            enable_progress_bar: True
            enable_model_summary: True
            limit_train_batches: null
            limit_val_batches: null
            gradient_clip_val: 0.5
